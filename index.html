<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Calculadora JavaScript</h1>

    <section class="container">
        <h2>Calculadora</h2>

        <div class="calc-input-group">
            <input type="number" id="valor1" placeholder="Valor 1">

            <select id="operacao">
                <option value="soma">+</option>
                <option value="subtracao">-</option>
                <option value="multiplicacao">*</option>
                <option value="divisao">/</option>
                <option value="resto">%</option>
            </select>

            <input type="number" id="valor2" placeholder="Valor 2">
        </div>

        <button id="btnCalcular">Calcular</button>

        <div id="resultado-box">
            <span>Resultado:</span>
            <strong id="resultado">0</strong>
        </div>
    </section>

    <script>
        // Espera a página carregar
        document.getElementById('btnCalcular').addEventListener('click', calcular);

        function calcular() {
            const input1 = document.getElementById('valor1').value;
            const input2 = document.getElementById('valor2').value;
            const operacao = document.getElementById('operacao').value;

            // Validação: campos vazios
            if (input1 === "" || input2 === "") {
                document.getElementById('resultado').textContent = "Preencha os dois valores";
                return;
            }

            const valor1 = Number(input1);
            const valor2 = Number(input2);

            // Validação: números inválidos
            if (isNaN(valor1) || isNaN(valor2)) {
                document.getElementById('resultado').textContent = "Digite números válidos";
                return;
            }

            let resultado;

            if (operacao === 'soma') {
                resultado = valor1 + valor2;

            } else if (operacao === 'subtracao') {
                resultado = valor1 - valor2;

            } else if (operacao === 'multiplicacao') {
                resultado = valor1 * valor2;

            } else if (operacao === 'divisao') {

                if (valor2 === 0) {
                    document.getElementById('resultado').textContent = "Erro: divisão por zero";
                    return;
                }

                resultado = valor1 / valor2;

            } else {
                resultado = valor1 % valor2;
            }

            document.getElementById('resultado').textContent = resultado;
        }
    </script>

</body>
</html>
